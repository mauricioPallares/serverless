<!DOCTYPE html>
<html lang="es" class="dark:bg-zinc-950">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Universidades - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        border: 'hsl(214.3 31.8% 91.4%)',
                        ring: 'hsl(221.2 83.2% 53.3%)',
                        background: 'hsl(0 0% 100%)',
                        foreground: 'hsl(222.2 84% 4.9%)',
                        primary: { DEFAULT: 'hsl(222.2 47.4% 11.2%)', foreground: 'hsl(210 40% 98%)' },
                        muted: { DEFAULT: 'hsl(210 40% 96.1%)', foreground: 'hsl(215.4 16.3% 46.9%)' },
                        accent: { DEFAULT: 'hsl(210 40% 96.1%)', foreground: 'hsl(222.2 47.4% 11.2%)' },
                        card: { DEFAULT: 'hsl(0 0% 100%)', foreground: 'hsl(222.2 84% 4.9%)' },
                        destructive: { DEFAULT: 'hsl(0 84.2% 60.2%)', foreground: 'hsl(210 40% 98%)' },
                    },
                    borderRadius: { lg: '0.5rem', md: 'calc(0.5rem - 2px)', sm: 'calc(0.5rem - 4px)' },
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        /* shadcn dialog overlay */
        .overlay { opacity: 0; pointer-events: none; transition: opacity .2s ease; }
        .overlay.active { opacity: 1; pointer-events: all; }
        .overlay .dialog { transform: translateY(16px) scale(.98); transition: transform .2s ease; }
        .overlay.active .dialog { transform: translateY(0) scale(1); }
        /* spinner */
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }
    </style>
</head>
<body class="bg-muted min-h-screen text-foreground">

<!-- Header -->
<header class="border-b bg-card">
    <div class="mx-auto max-w-7xl px-6 py-6 flex items-center gap-3">
        <div class="rounded-lg bg-primary p-2 text-primary-foreground">
            <i data-lucide="graduation-cap" class="w-6 h-6"></i>
        </div>
        <div>
            <h1 class="text-xl font-semibold tracking-tight">Universidades del Mundo</h1>
            <p class="text-sm text-muted-foreground">Dashboard interactivo con datos de DynamoDB</p>
        </div>
    </div>
</header>

<main class="mx-auto max-w-7xl px-6 py-6 space-y-6">

    <!-- Table Card -->
    <div class="rounded-lg border bg-card shadow-sm">
        <div class="flex items-center gap-2 px-6 py-4 border-b">
            <i data-lucide="table-2" class="w-4 h-4 text-muted-foreground"></i>
            <h2 class="text-sm font-semibold">Listado de Universidades</h2>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead>
                    <tr class="border-b bg-muted/50">
                        <th class="px-4 py-3 text-left font-medium text-muted-foreground">#</th>
                        <th class="px-4 py-3 text-left font-medium text-muted-foreground">Universidad</th>
                        <th class="px-4 py-3 text-left font-medium text-muted-foreground">Ubicación</th>
                        <th class="px-4 py-3 text-left font-medium text-muted-foreground">Tipo</th>
                        <th class="px-4 py-3 text-left font-medium text-muted-foreground">Estudiantes</th>
                        <th class="px-4 py-3 text-left font-medium text-muted-foreground">Facultad</th>
                        <th class="px-4 py-3 text-left font-medium text-muted-foreground">Programas</th>
                        <th class="px-4 py-3 text-left font-medium text-muted-foreground">Año Fund.</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="8" class="text-center py-10 text-muted-foreground">Cargando datos…</td></tr>
                </tbody>
            </table>
        </div>
        <div class="flex items-center justify-center gap-3 px-6 py-4 border-t">
            <button id="btnPrev" onclick="loadPage(currentPage - 1)" disabled
                class="inline-flex items-center gap-1.5 rounded-md border px-3 py-1.5 text-sm font-medium transition-colors hover:bg-accent disabled:opacity-40 disabled:pointer-events-none">
                <i data-lucide="chevron-left" class="w-4 h-4"></i> Anterior
            </button>
            <span id="pageInfo" class="text-sm font-medium text-muted-foreground">Página 1</span>
            <button id="btnNext" onclick="loadPage(currentPage + 1)" disabled
                class="inline-flex items-center gap-1.5 rounded-md border px-3 py-1.5 text-sm font-medium transition-colors hover:bg-accent disabled:opacity-40 disabled:pointer-events-none">
                Siguiente <i data-lucide="chevron-right" class="w-4 h-4"></i>
            </button>
        </div>
    </div>

    <!-- Charts Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="rounded-lg border bg-card shadow-sm p-6">
            <div class="flex items-center gap-2 mb-4">
                <i data-lucide="bar-chart-3" class="w-4 h-4 text-muted-foreground"></i>
                <h3 class="text-sm font-semibold">Estudiantes por Universidad</h3>
            </div>
            <canvas id="chartStudents"></canvas>
        </div>
        <div class="rounded-lg border bg-card shadow-sm p-6">
            <div class="flex items-center gap-2 mb-4">
                <i data-lucide="pie-chart" class="w-4 h-4 text-muted-foreground"></i>
                <h3 class="text-sm font-semibold">Tipo de Universidad</h3>
            </div>
            <canvas id="chartType"></canvas>
        </div>
        <div class="rounded-lg border bg-card shadow-sm p-6">
            <div class="flex items-center gap-2 mb-4">
                <i data-lucide="trending-up" class="w-4 h-4 text-muted-foreground"></i>
                <h3 class="text-sm font-semibold">Facultad por Universidad</h3>
            </div>
            <canvas id="chartFaculty"></canvas>
        </div>
        <div class="rounded-lg border bg-card shadow-sm p-6">
            <div class="flex items-center gap-2 mb-4">
                <i data-lucide="book-open" class="w-4 h-4 text-muted-foreground"></i>
                <h3 class="text-sm font-semibold">Programas Ofrecidos</h3>
            </div>
            <canvas id="chartPrograms"></canvas>
        </div>
    </div>
</main>

<!-- Modal / Dialog -->
<div class="overlay fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm" id="overlay" onclick="closeCard(event)">
    <div class="dialog rounded-lg border bg-card shadow-lg w-[420px] max-w-[92vw] overflow-hidden">
        <!-- Dialog header -->
        <div class="flex items-center gap-3 px-6 py-4 border-b bg-primary text-primary-foreground">
            <div class="rounded-full bg-white/20 p-2">
                <i data-lucide="school" class="w-5 h-5"></i>
            </div>
            <h2 id="cardName" class="text-base font-semibold flex-1">—</h2>
            <span id="cardPosition" class="rounded-full bg-white/20 px-3 py-1 text-xs font-bold">#—</span>
        </div>
        <!-- Dialog body -->
        <div id="cardBody" class="px-6 py-5 space-y-3"></div>
        <!-- Dialog footer -->
        <div class="border-t px-6 py-3 flex justify-end">
            <button onclick="document.getElementById('overlay').classList.remove('active')"
                class="inline-flex items-center gap-1.5 rounded-md bg-primary px-4 py-2 text-sm font-medium text-primary-foreground hover:bg-primary/90 transition-colors">
                <i data-lucide="x" class="w-4 h-4"></i> Cerrar
            </button>
        </div>
    </div>
</div>

<script>
let currentPage = 1;
let allData = [];
let chartStudents, chartType, chartFaculty, chartPrograms;

const API_URL = 'https://imqtyyspi3.execute-api.us-east-2.amazonaws.com/default/poli';

async function loadPage(page) {
    currentPage = page;
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '<tr><td colspan="8" class="text-center py-10 text-muted-foreground"><svg class="inline animate-spin w-5 h-5 mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>Cargando…</td></tr>';

    try {
        const res = await fetch(`${API_URL}?page=${page}`);
        const json = await res.json();
        allData = json.data || [];
        renderTable(allData);
        updatePagination(json);
        renderCharts(allData);
    } catch (err) {
        tbody.innerHTML = `<tr><td colspan="8" class="text-center py-10 text-destructive font-medium">Error: ${err.message}</td></tr>`;
    }
}

function renderTable(items) {
    const tbody = document.getElementById('tableBody');
    if (!items.length) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center py-10 text-muted-foreground">Sin resultados</td></tr>';
        return;
    }
    tbody.innerHTML = items.map(u => `
        <tr onclick='showCard(${JSON.stringify(u).replace(/'/g, "&#39;")})' class="border-b cursor-pointer transition-colors hover:bg-muted/50">
            <td class="px-4 py-3 font-medium">${u.Position ?? '—'}</td>
            <td class="px-4 py-3 font-medium">${u.University_Name ?? '—'}</td>
            <td class="px-4 py-3 text-muted-foreground">${u.Location ?? '—'}</td>
            <td class="px-4 py-3">
                <span class="inline-flex items-center rounded-full border px-2.5 py-0.5 text-xs font-medium ${u.University_Type === 'Private' ? 'bg-violet-50 text-violet-700 border-violet-200' : 'bg-blue-50 text-blue-700 border-blue-200'}">
                    ${u.University_Type ?? '—'}
                </span>
            </td>
            <td class="px-4 py-3 tabular-nums">${Number(u.Total_Students ?? 0).toLocaleString()}</td>
            <td class="px-4 py-3 tabular-nums">${Number(u.Total_Faculty ?? 0).toLocaleString()}</td>
            <td class="px-4 py-3 tabular-nums">${u.Programs_Offered ?? '—'}</td>
            <td class="px-4 py-3 text-muted-foreground">${u.Established_Year ?? '—'}</td>
        </tr>
    `).join('');
}

function updatePagination(json) {
    document.getElementById('pageInfo').textContent = `Página ${json.page}`;
    document.getElementById('btnPrev').disabled = json.page <= 1;
    document.getElementById('btnNext').disabled = !json.hasNextPage;
}

function showCard(u) {
    document.getElementById('cardName').textContent = u.University_Name || '—';
    document.getElementById('cardPosition').textContent = `#${u.Position || '—'}`;

    const rows = [
        { icon: 'map-pin',       color: 'text-red-500    bg-red-50',    label: 'Ubicación',   value: u.Location },
        { icon: 'building-2',    color: 'text-blue-500   bg-blue-50',   label: 'Tipo',        value: u.University_Type },
        { icon: 'users',         color: 'text-green-500  bg-green-50',  label: 'Estudiantes', value: Number(u.Total_Students || 0).toLocaleString() },
        { icon: 'briefcase',     color: 'text-purple-500 bg-purple-50', label: 'Facultad',    value: Number(u.Total_Faculty || 0).toLocaleString() },
        { icon: 'book-open',     color: 'text-orange-500 bg-orange-50', label: 'Programas',   value: u.Programs_Offered },
        { icon: 'calendar',      color: 'text-teal-500   bg-teal-50',   label: 'Fundación',   value: u.Established_Year },
        { icon: 'map',           color: 'text-indigo-500 bg-indigo-50', label: 'Campus',      value: u.Number_of_Campuses },
        { icon: 'trees',         color: 'text-pink-500   bg-pink-50',   label: 'Área (acres)',value: Number(u.Campus_Area_Acres || 0).toLocaleString() },
    ];

    document.getElementById('cardBody').innerHTML = rows.map(r => `
        <div class="flex items-center gap-3">
            <div class="flex items-center justify-center w-8 h-8 rounded-md ${r.color}">
                <i data-lucide="${r.icon}" class="w-4 h-4"></i>
            </div>
            <span class="text-sm text-muted-foreground w-24">${r.label}</span>
            <span class="text-sm font-semibold">${r.value ?? '—'}</span>
        </div>
    `).join('');

    document.getElementById('overlay').classList.add('active');
    lucide.createIcons();
}

function closeCard(e) {
    if (e.target === e.currentTarget) {
        document.getElementById('overlay').classList.remove('active');
    }
}

/* ---------- Charts ---------- */
const COLORS = ['#6366f1','#22c55e','#f97316','#a855f7','#ef4444','#14b8a6','#6366f1','#ec4899','#eab308','#06b6d4'];

function destroyCharts() {
    [chartStudents, chartType, chartFaculty, chartPrograms].forEach(c => c?.destroy());
}

function renderCharts(items) {
    destroyCharts();
    const labels = items.map(u => u.University_Name?.substring(0, 18) || '—');

    chartStudents = new Chart(document.getElementById('chartStudents'), {
        type: 'bar',
        data: { labels, datasets: [{ label: 'Estudiantes', data: items.map(u => Number(u.Total_Students) || 0), backgroundColor: COLORS, borderRadius: 4 }] },
        options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: '#f1f5f9' } }, x: { grid: { display: false } } } },
    });

    const typeCounts = {};
    items.forEach(u => { const t = u.University_Type || 'Otro'; typeCounts[t] = (typeCounts[t] || 0) + 1; });
    chartType = new Chart(document.getElementById('chartType'), {
        type: 'doughnut',
        data: { labels: Object.keys(typeCounts), datasets: [{ data: Object.values(typeCounts), backgroundColor: COLORS, borderWidth: 0 }] },
        options: { responsive: true, cutout: '65%' },
    });

    chartFaculty = new Chart(document.getElementById('chartFaculty'), {
        type: 'line',
        data: { labels, datasets: [{ label: 'Facultad', data: items.map(u => Number(u.Total_Faculty) || 0), borderColor: '#a855f7', backgroundColor: 'rgba(168,85,247,.1)', fill: true, tension: .4, pointRadius: 3, pointBackgroundColor: '#a855f7' }] },
        options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: '#f1f5f9' } }, x: { grid: { display: false } } } },
    });

    chartPrograms = new Chart(document.getElementById('chartPrograms'), {
        type: 'polarArea',
        data: { labels, datasets: [{ data: items.map(u => Number(u.Programs_Offered) || 0), backgroundColor: COLORS.map(c => c + '99'), borderWidth: 0 }] },
        options: { responsive: true, plugins: { legend: { display: false } } },
    });
}

// Auto-load
window.addEventListener('DOMContentLoaded', () => {
    lucide.createIcons();
    loadPage(1);
});
</script>

</body>
</html>
